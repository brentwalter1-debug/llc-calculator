<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The LLC Threshold Calculator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Base & Reset --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Very light blue/gray background */
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- Main Calculator Card --- */
        .calculator-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            border-top: 6px solid #1e3a8a; /* Deep blue professional accent */
        }

        h2 {
            color: #1e3a8a;
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 25px;
        }

        /* --- Input & Buttons --- */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px 12px 35px; /* Extra left padding for the $ symbol */
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #1e3a8a;
        }

        button.calc-btn {
            width: 100%;
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button.calc-btn:hover {
            background-color: #172554;
        }

        /* --- Results Area --- */
        .result-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            display: none; /* Hidden until calculated */
        }

        .tax-estimate {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .tax-amount {
            font-weight: 700;
            color: #0f172a;
            font-size: 1.4rem;
        }

        /* --- Dynamic Threshold Alerts --- */
        .threshold-message {
            color: #15803d; /* Trust-building green */
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: none; /* Hidden by default */
            /* Flashing animation */
            animation: flash 1.5s infinite alternate; 
        }

        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0.6; text-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
        }

        /* --- Pulsing Call to Action Button --- */
        .cta-btn {
            display: none; /* Hidden by default */
            background-color: #16a34a; /* Vibrant green */
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            /* Pulsing animation */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .cta-btn:hover {
            background-color: #15803d;
            animation: none; /* Stop pulsing on hover for a stable click */
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>LLC Threshold Calculator</h2>
        <p class="subtitle">Estimate your self-employment tax burden.</p>

        <div class="input-group">
            <span class="currency-symbol">$</span>
            <input type="number" id="monthlyIncome" placeholder="Monthly Side-Hustle Income" min="0" step="any">
        </div>

        <button class="calc-btn" onclick="calculateTax()">Calculate Tax</button>

        <div class="result-area" id="resultArea">
            <p class="tax-estimate">Estimated Annual SE Tax:<br> <span class="tax-amount" id="taxAmount">$0.00</span></p>
            
            <p class="threshold-message" id="thresholdMessage">
                You are making enough that forming an LLC or S-Corp could save you thousands in taxes!
            </p>
            
            <a href="https://your-placeholder-url-here.com" class="cta-btn" id="ctaBtn" target="_blank">Start Your LLC Today</a>
        </div>
    </div>

    <script>
        function calculateTax() {
            // 1. Get the value from the input field
            const incomeInput = document.getElementById('monthlyIncome').value;
            const monthlyIncome = parseFloat(incomeInput);

            // Basic validation: ensure they typed a valid number greater than 0
            if (isNaN(monthlyIncome) || monthlyIncome <= 0) {
                alert("Please enter a valid monthly income.");
                return;
            }

            // 2. Perform the math
            const annualIncome = monthlyIncome * 12;
            const selfEmploymentTaxRate = 0.153; // 15.3%
            const estimatedTax = annualIncome * selfEmploymentTaxRate;

            // 3. Format the result as currency (e.g., $5,000.00)
            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
            });

            // 4. Update the DOM (HTML) with the formatted result
            document.getElementById('taxAmount').innerText = formatter.format(estimatedTax);
            document.getElementById('resultArea').style.display = 'block';

            // 5. Check the threshold logic to trigger the green flash and CTA
            const thresholdMessage = document.getElementById('thresholdMessage');
            const ctaBtn = document.getElementById('ctaBtn');

            if (monthlyIncome > 4000) {
                // If over $4k/month, show the message and the pulsing button
                thresholdMessage.style.display = 'block';
                ctaBtn.style.display = 'inline-block';
            } else {
                // If under or exactly $4k, ensure they remain hidden
                thresholdMessage.style.display = 'none';
                ctaBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
