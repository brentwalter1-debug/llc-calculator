<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>The LLC Threshold Calculator | Save on Taxes</title>
    <meta name="description" content="Calculate your self-employment tax, state tax, and get a free customized PDF strategy report.">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-navy: #0f172a;
            --primary-navy-hover: #1e293b;
            --success-green: #10b981;
            --success-green-hover: #059669;
            --danger-red: #ef4444;
            --accent-blue: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calculator-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .calculator-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, var(--primary-navy), var(--accent-blue));
        }

        h2 { color: var(--primary-navy); margin-top: 0; font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        p.subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 32px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--primary-navy); margin-bottom: 8px; }
        
        .currency-symbol { position: absolute; left: 16px; bottom: 14px; color: var(--text-muted); font-weight: 500; font-size: 1.1rem; }
        
        input[type="number"], select, input[type="email"] {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1.1rem; font-weight: 500; font-family: 'Inter', sans-serif;
            color: var(--primary-navy); box-sizing: border-box; transition: all 0.2s ease;
        }

        input[type="number"] { padding: 14px 16px 14px 40px; }
        select, input[type="email"] { padding: 14px 16px; cursor: pointer; }
        
        input:focus, select:focus { outline: none; background-color: #ffffff; border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        button.primary-btn {
            width: 100%; background-color: var(--primary-navy); color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-top: 10px;
        }
        button.primary-btn:hover { background-color: var(--primary-navy-hover); transform: translateY(-1px); }
        button.primary-btn:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }

        /* --- LEAD CAPTURE GATE --- */
        .lead-gate {
            display: none; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-top: 24px;
            animation: fadeIn 0.5s ease forwards; text-align: left;
        }
        .lead-gate h3 { margin-top: 0; font-size: 1.2rem; color: var(--primary-navy); }
        .lead-gate p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }

        /* --- RESULTS AREA --- */
        .result-area { display: none; margin-top: 32px; padding-top: 32px; border-top: 1px solid #e2e8f0; animation: fadeIn 0.5s ease forwards; }
        
        #pdfContent { padding: 20px; background: white; border-radius: 12px; }
        
        .tax-estimate { font-size: 1rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        .tax-amount { font-weight: 700; color: var(--primary-navy); font-size: 2.5rem; margin: 0 0 8px 0; }
        .state-tax-sub { font-size: 0.9rem; color: var(--danger-red); margin-bottom: 24px; font-weight: 500; }

        .visual-bar-container { width: 100%; height: 24px; background-color: #e2e8f0; border-radius: 12px; overflow: hidden; display: flex; margin-bottom: 12px; }
        .take-home-bar { height: 100%; background-color: var(--primary-navy); width: 0%; transition: width 1.2s ease-out; }
        .tax-bar { height: 100%; background-color: var(--danger-red); width: 0%; transition: width 1.2s ease-out; }
        
        .legend { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 500; margin-bottom: 24px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot-navy { height: 10px; width: 10px; background-color: var(--primary-navy); border-radius: 50%; }
        .dot-red { height: 10px; width: 10px; background-color: var(--danger-red); border-radius: 50%; }

        .cta-btn { display: none; background-color: var(--success-green); color: white; text-decoration: none; padding: 16px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; width: 100%; box-sizing: border-box; display: inline-block; margin-top: 10px; }
        .pdf-btn { background-color: #f1f5f9; color: var(--primary-navy); border: 1px solid #cbd5e1; padding: 14px; border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 12px; transition: all 0.2s ease; }
        .pdf-btn:hover { background-color: #e2e8f0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>LLC Tax Strategist</h2>
        <p class="subtitle">Enterprise-grade self-employment tax analysis.</p>

        <div class="input-group">
            <label class="input-label" for="monthlyIncome">Estimated Monthly Revenue</label>
            <span class="currency-symbol">$</span>
            <input type="number" id="monthlyIncome" placeholder="0.00" oninput="saveData()" min="0">
        </div>

        <div class="input-group">
            <label class="input-label" for="monthlyExpenses">Estimated Monthly Expenses</label>
            <span class="currency-symbol">$</span>
            <input type="number" id="monthlyExpenses" placeholder="0.00" oninput="saveData()" min="0">
        </div>

        <div class="input-group">
            <label class="input-label" for="userState">Select Your State</label>
            <select id="userState" onchange="saveData()">
                <option value="none">No State Income Tax (AK, FL, NV, NH, SD, TN, TX, WA, WY)</option>
                <option value="AL">Alabama</option><option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option><option value="CA">California</option>
                <option value="CO">Colorado</option><option value="CT">Connecticut</option>
                <option value="DE">Delaware</option><option value="GA">Georgia</option>
                <option value="HI">Hawaii</option><option value="ID">Idaho</option>
                <option value="IL">Illinois</option><option value="IN">Indiana</option>
                <option value="IA">Iowa</option><option value="KS">Kansas</option>
                <option value="KY">Kentucky</option><option value="LA">Louisiana</option>
                <option value="ME">Maine</option><option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option><option value="MI">Michigan</option>
                <option value="MN">Minnesota</option><option value="MS">Mississippi</option>
                <option value="MO">Missouri</option><option value="MT">Montana</option>
                <option value="NE">Nebraska</option><option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option><option value="NY">New York</option>
                <option value="NC">North Carolina</option><option value="ND">North Dakota</option>
                <option value="OH">Ohio</option><option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option><option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option><option value="SC">South Carolina</option>
                <option value="UT">Utah</option><option value="VT">Vermont</option>
                <option value="VA">Virginia</option><option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
            </select>
        </div>

        <button class="primary-btn" id="initCalcBtn" onclick="triggerLeadGate()">Analyze My Strategy</button>

        <div class="lead-gate" id="leadGate">
            <h3>🔒 Your Strategy is Ready</h3>
            <p>Enter your email to unlock your exact visual tax breakdown and strategy report.</p>
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="your@email.com" required>
            </div>
            <button class="primary-btn" id="unlockBtn" onclick="unlockResults()">Unlock My Results</button>
        </div>

        <div class="result-area" id="resultArea">
            <div id="pdfContent">
                <div class="tax-estimate">Total Estimated Annual Tax</div>
                <div class="tax-amount" id="taxAmount">$0.00</div>
                <div class="state-tax-sub" id="stateTaxSub">Includes $0.00 in State Tax</div>
                
                <div class="visual-bar-container">
                    <div class="take-home-bar" id="takeHomeBar"></div>
                    <div class="tax-bar" id="taxBar"></div>
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="dot-navy"></span> Annual Take-Home</div>
                    <div class="legend-item"><span class="dot-red"></span> Federal + State Tax</div>
                </div>
            </div>
            
            <a href="#" class="cta-btn" id="ctaBtn" target="_blank" rel="noopener noreferrer">Start Your LLC Today</a>
            <button class="pdf-btn" onclick="downloadPDF()">📄 Download PDF Report</button>
        </div>
    </div>

    <script>
        const formatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

        // Complete 50-State approximate tax rates dictionary (Averages for MVP purposes)
        const stateTaxRates = {
            "none": 0.0, "AL": 0.05, "AZ": 0.025, "AR": 0.047, "CA": 0.08, "CO": 0.044,
            "CT": 0.06, "DE": 0.066, "GA": 0.0549, "HI": 0.07, "ID": 0.058, "IL": 0.0495,
            "IN": 0.0315, "IA": 0.057, "KS": 0.057, "KY": 0.045, "LA": 0.0425, "ME": 0.0715,
            "MD": 0.0575, "MA": 0.05, "MI": 0.0425, "MN": 0.068, "MS": 0.04, "MO": 0.0495,
            "MT": 0.059, "NE": 0.0584, "NJ": 0.06, "NM": 0.049, "NY": 0.06, "NC": 0.045,
            "ND": 0.025, "OH": 0.035, "OK": 0.0475, "OR": 0.08, "PA": 0.0307, "RI": 0.0599,
            "SC": 0.064, "UT": 0.0465, "VT": 0.066, "VA": 0.0575, "WV": 0.0495, "WI": 0.053
        };

        function saveData() {
            localStorage.setItem("app_income", document.getElementById('monthlyIncome').value);
            localStorage.setItem("app_expenses", document.getElementById('monthlyExpenses').value);
            localStorage.setItem("app_state", document.getElementById('userState').value);
        }

        window.onload = function() {
            if(localStorage.getItem("app_income")) document.getElementById('monthlyIncome').value = localStorage.getItem("app_income");
            if(localStorage.getItem("app_expenses")) document.getElementById('monthlyExpenses').value = localStorage.getItem("app_expenses");
            if(localStorage.getItem("app_state")) document.getElementById('userState').value = localStorage.getItem("app_state");
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                obj.innerHTML = formatter.format(easeOut * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function triggerLeadGate() {
            const income = parseFloat(document.getElementById('monthlyIncome').value);
            const expenses = parseFloat(document.getElementById('monthlyExpenses').value) || 0;
            
            // Error Handling: Stop if inputs are invalid or negative
            if (isNaN(income) || income < 0 || expenses < 0) {
                alert("Please enter valid, positive numbers for your revenue and expenses.");
                return;
            }
            
            document.getElementById('initCalcBtn').style.display = 'none';
            document.getElementById('leadGate').style.display = 'block';
        }

        // --- ASYNC API FETCH (The Database Connection) ---
        async function unlockResults() {
            const emailInput = document.getElementById('userEmail');
            const email = emailInput.value;
            const unlockBtn = document.getElementById('unlockBtn');

            // Regex for bulletproof email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                alert("Please enter a valid email address to unlock your strategy.");
                return;
            }

            // UI Polish: Change button to show it's processing
            unlockBtn.disabled = true;
            unlockBtn.innerHTML = "Analyzing...";

            // 1. Prepare the data to send to your database
            const formData = new FormData();
            formData.append("email", email);

            // 2. Actually send the data using JavaScript Fetch API
            try {
                // IMPORTANT: Replace the URL below with your actual Formspree endpoint later!
                await fetch("https://formspree.io/YOUR_FORM_ID_HERE", {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (error) {
                console.log("Database connection not yet configured. Bypassing for local test.");
            }

            // 3. Process the math and show the results
            document.getElementById('leadGate').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';

            const income = parseFloat(document.getElementById('monthlyIncome').value);
            const expenses = parseFloat(document.getElementById('monthlyExpenses').value) || 0;
            const state = document.getElementById('userState').value;
            
            const netMonthlyProfit = income - expenses;
            const annualProfit = Math.max(0, netMonthlyProfit * 12);
            
            const fedTaxRate = 0.153; 
            const stateTaxRate = stateTaxRates[state];
            
            const estimatedFedTax = annualProfit * fedTaxRate;
            const estimatedStateTax = annualProfit * stateTaxRate;
            const totalTax = estimatedFedTax + estimatedStateTax;
            const takeHomePay = annualProfit - totalTax;

            animateValue(document.getElementById('taxAmount'), 0, totalTax, 1200);
            
            if(estimatedStateTax > 0) {
                document.getElementById('stateTaxSub').innerHTML = `Includes ${formatter.format(estimatedStateTax)} in Estimated State Tax`;
            } else {
                document.getElementById('stateTaxSub').innerHTML = `You live in a great state! No state income tax applied.`;
            }

            setTimeout(() => {
                const takeHomePct = annualProfit > 0 ? (takeHomePay / annualProfit) * 100 : 0;
                const taxPct = annualProfit > 0 ? (totalTax / annualProfit) * 100 : 0;
                document.getElementById('takeHomeBar').style.width = `${takeHomePct}%`;
                document.getElementById('taxBar').style.width = `${taxPct}%`;
            }, 100);
        }

        function downloadPDF() {
            const element = document.getElementById('pdfContent');
            const opt = {
                margin: 0.5, filename: 'My_LLC_Tax_Strategy.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
